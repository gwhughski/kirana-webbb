<!DOCTYPE html>
<html lang="id">
  <head><
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width-device-width, inital-scale=1.0"/>
  <title>Kirana webbb</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
  </head>
  <body class="text-white">
    <div class="chat-container max-w-md mx-auto py-6 px-4 flex flex-col gap-3 min-h-screen">
      <!--tanggal -->
      <div class="flex justify-center-my-4">
        <div class="bg-[#1f2c33] text-gray-400 text-xs px-3 py-1 rounded-full">
          1 February 2026
        </div>
      </div>

      <!--chat dari dia-->
      <div class="flex flex-col items-start">
        <div class="chat-bubble from-them">
          <div class="message-content">
            <span>woi lunaldo</span>
            <span class="timestamp">1:52 am</span>
          </div>
        </div>
      </div>

      <!--chat dari kita dinamis-->
      <div id="chatBox" class="flex flex-col gap-3 mt-4"></div>
    </div>

    <!-- Overlay akhir -->
    <div id=""finalOverlay" class="fixed inset-0 bg-black bg-opacity-90 flex items-center justify-center text-center text-white text-lg md:text-xl px-6 opacity-0 pointer-events-none transition-opacity duraction-1000">
      <p>kirana kmu keren,yagak.</p>
    </div>

    <script src="script.js"></script>
  </body>
</html>
